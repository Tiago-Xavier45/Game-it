<!DOCTYPE html>
<html lang="pt-BR" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game It | Jogo</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/Game It Logo.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="profile-body">
<nav class="g-nav" id="top-nav">
    <div class="nav-logo">
        <img src="/static/img/Game It Logo.svg" width="32" height="32" alt="Game It Logo">
        <span class="nav-title">Game <span style="color:#6366F1">It</span></span>
    </div>
    <div class="nav-pills">
        <a href="/perfil" class="nav-pill" style="text-decoration:none;">Home</a>
        <span class="nav-pill">Review</span>
        <a href="/perfil" class="nav-pill" style="text-decoration:none;">Perfil</a>
        <a href="/progresso" class="nav-pill" style="text-decoration:none;">Progresso</a>
    </div>
    <div class="nav-actions">
        <button onclick="fazerLogout()" title="Sair" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:7px 13px;color:#f87171;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
        </button>
    </div>
</nav>
<main class="game-page cscroll">
    <section class="game-hero panel">
        <div class="game-hero-bg" id="game-hero-bg"></div>
        <div class="game-hero-content">
            <img id="game-cover" class="game-cover" src="" alt="Capa do jogo">
            <div class="game-head">
                <h1 id="game-name" class="game-name">Carregando...</h1>
                <div id="game-genres" class="game-genres"></div>
                <p id="game-meta" class="game-meta"></p>
                <p id="game-desc" class="game-desc"></p>
                <div class="game-scores">
                    <div class="score-card">
                        <span class="score-label">Média Game It</span>
                        <span class="score-value" id="score-community">—</span>
                        <span class="score-sub" id="score-community-sub"></span>
                    </div>
                    <div class="score-card">
                        <span class="score-label"><i class="fa-brands fa-steam"></i> Steam</span>
                        <span class="score-value" id="score-steam">—</span>
                        <span class="score-sub" id="score-steam-sub"></span>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div class="game-grid">
        <main class="game-main">
            <section class="panel pcard">
                <h3 class="pcard-title">Seu status</h3>
                <div id="status-buttons" class="status-buttons">
                    <button class="status-btn" data-st="jogando" onclick="definirStatus('jogando')"><i class="fa-solid fa-play"></i> Jogando</button>
                    <button class="status-btn" data-st="jogado" onclick="definirStatus('jogado')"><i class="fa-solid fa-check"></i> Jogado</button>
                    <button class="status-btn" data-st="backlog" onclick="definirStatus('backlog')"><i class="fa-solid fa-box-archive"></i> Backlog</button>
                    <button class="status-btn" data-st="wishlist" onclick="definirStatus('wishlist')"><i class="fa-solid fa-gift"></i> Wishlist</button>
                    <button class="status-btn platinum" data-st="platinado" onclick="definirStatus('platinado')"><i class="fa-solid fa-gamepad"></i> Platinado</button>
                </div>
                <div class="status-extra">
                    <label class="status-field">
                        <span class="pfield-label">Comecei a jogar em</span>
                        <input id="status-date" type="date" class="pfield" onchange="salvarExtra()">
                    </label>
                    <label class="status-field">
                        <span class="pfield-label">Jogadas (replays)</span>
                        <div class="replay-control">
                            <button type="button" onclick="ajustarReplay(-1)"><i class="fa-solid fa-minus"></i></button>
                            <span id="replay-count">0</span>
                            <button type="button" onclick="ajustarReplay(1)"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </label>
                </div>
                <p id="played-info" class="played-info"></p>
            </section>
            <section class="panel pcard">
                <div class="pcard-title-row">
                    <h3 class="pcard-title">Avaliações da comunidade</h3>
                    <button class="btn-primary btn-sm"><i class="fa-solid fa-star"></i> Avaliar</button>
                </div>
                <div id="game-reviews" class="game-reviews">
                    <div class="recent-loading"><div class="spinner-sm"></div></div>
                </div>
            </section>
        </main>
        <aside class="game-side">
            <section class="panel pcard">
                <h3 class="pcard-title">Sua coleção</h3>
                <div class="count-box">
                    <div class="count-row"><span><i class="fa-solid fa-play"></i> Jogando</span><b id="cnt-jogando">0</b></div>
                    <div class="count-row"><span><i class="fa-solid fa-check"></i> Jogados</span><b id="cnt-jogado">0</b></div>
                    <div class="count-row"><span><i class="fa-solid fa-box-archive"></i> Backlog</span><b id="cnt-backlog">0</b></div>
                    <div class="count-row"><span><i class="fa-solid fa-gift"></i> Wishlist</span><b id="cnt-wishlist">0</b></div>
                    <div class="count-row platinum"><span><i class="fa-solid fa-gamepad"></i> Platinados</span><b id="cnt-platinado">0</b></div>
                </div>
            </section>
        </aside>
    </div>
</main>
<div id="toast" class="toast"></div>
<script>
    window.APPID = '{{ appid }}';
</script>
<script src="{{ url_for('static', filename='js/game.js') }}"></script>
</body>
</html>
